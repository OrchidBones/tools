<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课表</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/libs/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/week_switcher.css">
    <script src="scripts/libs/jquery.min.js"></script>
    <script src="scripts/libs/bootstrap.bundle.min.js"></script>
    <script src="scripts/libs/jquery.countdown.min.js"></script>
    <script src="scripts/libs/dayjs.min.js"></script>
    <script type="module" src="scripts/main.js"></script>
</head>
<body>
    <div class="contents">
        <h1><strong></strong></h1>
        <div class="tip-area">
            <div class="next-exam-area">
            </div>
            <div class="next-classroom-area">
            </div>
        </div>
        <div class="tip-bar-area">
            <div class="tip-bar">
                <span class="next-tip"><div class="next-block"></div><span class="next-text"></span></span>
                <span class="current-tip"><div class="current-block"></div><span class="current-text"></span></span>
            </div>
        </div>
        <div class="output-area">
            <div class="today-schedule">
                <h5><span class="time-tag"></span><span class="class-schedule-general-text"></span>: <strong><span class="week-day"></span></strong></h5>
                <div class="table-area table-responsive"></div>
            </div>
            <div class="input-area">
                <form>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text"></span>
                        </div>
                        <input type="text" id="weeknumber" class="form-control">
                    </div>
                </form>
            </div>
            <div class="weeknumber-navigation-area text-center">
                <div class="week-switcher" id="weekSwitcher">
                    <button class="btn-nav btn-nav-prev" data-action="prev">
                        <i class="fa fa-chevron-left"></i><span></span>
                    </button>
                    <button class="btn-nav btn-nav-next" data-action="next">
                        <span></span><i class="fa fa-chevron-right"></i>
                    </button>
                </div>
            </div>
            <div class="whole-schedule">
                <h5><span class="weeknumber-ordinal-numeral-text"></span><span class="class-schedule-general-text"></span>: <span class="current-week-tag"></span></h5>
                <div class="table-area table-responsive"></div>
            </div>
        </div>
    </div>
</body>
